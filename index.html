<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>FTP Uploader</title>
    <script>
      window.__APP_BOOT__ = Date.now();
      console.log('[diagnostic] HTML loaded via', location.href);
      window.addEventListener('error', function(e) {
        console.error('[diagnostic] Global error:', e.message, e.filename, e.lineno);
      });
      window.addEventListener('unhandledrejection', function(e) {
        console.error('[diagnostic] Unhandled rejection:', e.reason);
      });
      // 监听模块脚本加载/错误事件（module 加载失败不会触发 window error）
      window.addEventListener('DOMContentLoaded', function() {
        var scripts = document.querySelectorAll('script[type="module"]');
        scripts.forEach(function(s) {
          s.addEventListener('error', function(e) {
            console.error('[diagnostic] Module FAILED TO LOAD:', s.src, e);
          });
          s.addEventListener('load', function() {
            console.log('[diagnostic] Module loaded successfully:', s.src);
          });
        });
      });
    </script>
    <script type="module" src="./assets/index-BNaOrsG_.js"></script>
    <link rel="stylesheet" href="./assets/index-CA9Jbh4P.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
